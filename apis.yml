aid: mediastack
name: Mediastack
description: >-
  Mediastack is a free and paid REST API by apilayer for live, historical, and blog news articles aggregated from more
  than 7,500 publishers across 50+ countries and 13 languages. It exposes a /v1/news endpoint for keyword-, source-,
  country-, language-, category-, and date-filtered search, and a /v1/sources endpoint for browsing the underlying
  publisher catalog.
