        limit: 50000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Overage Per Request
        name: overage_per_request
        type: metered
        metric: request
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.0079992'
