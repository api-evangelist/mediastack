focusColumns:
  ServiceName: Mediastack News API
  ServiceCategory: News & Media Data
  ProviderName: Mediastack
  PublisherName: apilayer (operated by ipapi LLC)
  InvoiceIssuerName: apilayer (operated by ipapi LLC)
